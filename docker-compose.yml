services:
  api:
    build: .
    container_name: camera_map_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
      - minio

  db:
    image: postgres:16
    container_name: camera_map_db
    environment:
      POSTGRES_DB: camera_map
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
        - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: camera_map_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: camera_map_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data: